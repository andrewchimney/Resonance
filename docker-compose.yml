services:
  backend:
    build: ./backend
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
    env_file:
      - .env
    depends_on:
      - vita-converter
    environment:
      DATABASE_URL: ${DATABASE_URL}
      STORAGE_URL: ${STORAGE_URL}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      PRESETS_BUCKET: ${PRESETS_BUCKET}
      PREVIEWS_BUCKET: ${PREVIEWS_BUCKET}
      VITA_CONVERTER_URL: http://vita-converter:5000
      EMBEDDING_MODEL: clap
      EMBEDDING_DIM: "512"
      HF_TOKEN: ${HF_TOKEN}
      LLM_PROVIDER: gemini
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_PREVIEWS_BUCKET=${PREVIEWS_BUCKET}
      - NEXT_PUBLIC_PRESETS_BUCKET=${PRESETS_BUCKET}
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

  vita-converter:
    platform: linux/amd64
    build: ./vita-converter
    ports:
      - "5050:5000"
